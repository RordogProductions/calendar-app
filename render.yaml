databases:
  - name: calendar-db
    databaseName: calendar
    plan: free

services:
  - type: web
    name: my-calendar
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: calendar-db
          property: connectionString
